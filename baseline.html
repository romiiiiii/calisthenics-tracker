<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting Point | Calisthenics Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">&hearts; Calisthenics Tracker &hearts;</a>
    </div>
    <button class="burger" type="button" aria-label="Open navigation menu" onclick="toggleMenu()">&#9776;</button>
  </nav>

  <div class="sidebar" id="sidebar">
    <a href="index.html">My Glow Up</a>
    <a href="baseline.html">Starting Point</a>
    <a href="plan.html">My Routine</a>
    <a href="progress.html">Progress &amp; PRs</a>
    <a href="achievements.html">Streaks &amp; Wins</a>
    <a href="#" onclick="logoutUser(); return false;">Log Out</a>
  </div>

  <div class="page-container">
    <div class="card">
      <p class="eyebrow">Personal Setup</p>
      <h1>Starting Point</h1>
      <p style="text-align:center;">
        Hi <span id="baselineProfileName">there</span>, tell the app what you can do right now so your plan does not waste your time.
      </p>

      <div class="form" id="baselineForm">
        <input type="number" id="baselinePushups" min="0" placeholder="Max push-ups you can do right now">
        <input type="number" id="baselinePullups" min="0" placeholder="Max pull-ups you can do right now">
        <input type="number" id="baselineDips" min="0" placeholder="Max dips you can do right now">
        <input type="number" id="baselineSquats" min="0" placeholder="Max bodyweight squats you can do right now">
        <input type="number" id="baselinePlank" min="0" placeholder="Plank hold in seconds">

        <select id="baselineDays">
          <option value="">Training days per week</option>
          <option value="2">2 days</option>
          <option value="3">3 days</option>
          <option value="4">4 days</option>
        </select>

        <button onclick="saveBaseline()">Save My Starting Point</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
