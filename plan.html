<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Routine | Calisthenics Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
  <div class="logo">
    <a href="index.html" style="text-decoration:none; color:inherit;">
      💗 Calisthenics Tracker 💗
    </a>
  </div>
  <button class="burger" onclick="toggleMenu()">☰</button>
</nav>

  <div class="sidebar" id="sidebar">
  <a href="index.html">My Glow Up</a>
  <a href="plan.html">My Routine</a>
  <a href="progress.html">Progress & PRs</a>
</div>

  <div class="page-container">
    <div class="card">
      <h1>My Routine</h1>
      <p style="text-align:center;">
        Create a weekly calisthenics plan that actually matches your level and goals ✨
      </p>

      <div class="form">
        <select id="goal">
          <option value="">Choose your goal</option>
          <option value="strength">Build Strength</option>
          <option value="endurance">Build Endurance</option>
          <option value="skills">Learn Skills</option>
        </select>

        <select id="level">
          <option value="">Choose your level</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
        </select>

        <select id="daysPerWeek">
          <option value="">Training days per week</option>
          <option value="2">2 days</option>
          <option value="3">3 days</option>
          <option value="4">4 days</option>
        </select>

        <button onclick="generatePlan()">Generate My Routine</button>
      </div>

      <div id="planOutput" class="plan-output"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
